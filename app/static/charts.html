<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg"/>
<meta name="theme-color" content="#0d1626"/>
<title>Charts — EnvMonitor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link rel="stylesheet" href="/static/dashboard.css?v=10"/>
</head>
<body class="is-loading">

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-icon">◈</div>
    <span>ENV<span class="acc">MONITOR</span></span>
  </div>
  <nav class="sb-nav">
    <div class="nav-group-label">MAIN</div>
    <a href="/dashboard" class="nav-item"><span class="ni">🏠</span> Overview</a>
    <a href="/sensors" class="nav-item"><span class="ni">📡</span> Sensors</a>
    <a href="/alerts" class="nav-item"><span class="ni">⚠️</span> Alerts <span class="badge-n" id="alert-count">0</span></a>
    <div class="nav-group-label" style="margin-top:20px">REPORTS</div>
    <a href="/charts" class="nav-item active"><span class="ni">📊</span> Charts</a>
    <a href="#" class="nav-item disabled"><span class="ni">📋</span> Logs <span class="soon-badge">Soon</span></a>
    <div class="nav-group-label" style="margin-top:20px">SYSTEM</div>
    <a href="/settings" class="nav-item"><span class="ni">⚙️</span> Settings</a>
    <a href="#" class="nav-item disabled"><span class="ni">❓</span> Help <span class="soon-badge">Soon</span></a>
  </nav>
  <div class="sb-user" id="sb-user">
    <div class="sb-avatar" id="sb-avatar">U</div>
    <div class="sb-info">
      <div class="sb-name" id="sb-name">User</div>
      <div class="sb-role">Admin</div>
    </div>
    <button class="sb-logout" onclick="logout()" title="Logout" aria-label="Logout">⏏</button>
  </div>
</aside>

<!-- MAIN -->
<div class="main" id="main">
  <header class="topbar">
    <div class="topbar-l">
      <button class="hamburger" onclick="toggleSidebar()" id="hamburger" aria-label="Toggle sidebar">☰</button>
      <div>
        <h1 class="page-title">Charts</h1>
        <p class="page-sub">Recent history per sensor</p>
      </div>
    </div>
    <div class="topbar-r">
      <button class="theme-toggle" id="theme-toggle" title="Toggle Dark / Light mode (D)" aria-label="Toggle dark or light mode">🌙</button>
      <button class="notif-btn" id="notif-btn">
        🔔
        <span class="notif-badge" id="notif-badge" style="display:none">0</span>
      </button>
      <div class="user-chip" id="user-chip">
        <div class="chip-avatar" id="chip-avatar">U</div>
        <span id="chip-name">User</span>
      </div>
    </div>
  </header>

  <div class="content">
    <div class="section-header">
      <h2 class="section-title">Sensor History</h2>
      <div class="update-tag"><span class="u-dot"></span>Last 50 readings this session</div>
    </div>

    <div class="charts-grid" id="charts-grid"></div>
  </div>
</div>

<button class="shortcuts-trigger" id="shortcuts-trigger" title="Keyboard shortcuts" aria-label="Show keyboard shortcuts">?</button>
<div class="shortcuts-panel" id="shortcuts-panel">
  <div class="sp-title">Keyboard shortcuts</div>
  <div class="sp-row"><span>Toggle dark / light mode</span><kbd>D</kbd></div>
  <div class="sp-row"><span>Refresh data</span><kbd>R</kbd></div>
</div>

<script src="/static/shell.js?v=3"></script>
<script src="/static/charts.js?v=2"></script>
</body>
</html>
